name: library_ai
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

#Dependencies: Sono i materiali che restano nell'edificio finito (mattoni, cavi elettrici).
#Senza questi, l'app non può girare sul telefono dell'utente. Qui mettiamo Firebase, l'IA, le icone, ecc.
dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.10.1 
  firebase_auth: ^5.4.1
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.6.2
  google_generative_ai: ^0.4.7
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  get_it: ^9.2.0
  shared_preferences: ^2.2.2 # <--- AGGIUNTO
  youtube_player_flutter: ^9.1.3
  url_launcher: ^6.3.2
  supabase_flutter: ^2.12.0
  flutter_svg: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
  - assets/images/
  - assets/images/covers/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/cinelogo.png"
  min_sdk_size: 21
  web:
    generate: true
    image_path: "assets/images/cinelogo.png"
